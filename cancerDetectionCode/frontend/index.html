
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cervical Cancer Prediction</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Cervical Cancer Risk Prediction</h1>
    <p class="subtitle">Enter your medical details</p>

    <label>Age</label>
    <input type="number" id="age" placeholder="Enter age">

    <label>Number of Sexual Partners</label>
    <input type="number" id="partners" placeholder="Enter number">

    <label>Do you smoke?</label>
    <select id="smokes">
      <option value="">Select</option>
      <option value="1">Yes</option>
      <option value="0">No</option>
    </select>

    <label>Any STDs?</label>
    <select id="stds">
      <option value="">Select</option>
      <option value="1">Yes</option>
      <option value="0">No</option>
    </select>

    <label>Diagnosed in past?</label>
    <select id="dx">
    <option value="">Select</option>
    <option value="1">Yes</option>
    <option value="0">No</option>
    </select>

    


    <button onclick="predict()">Predict Risk</button>

    <div id="result"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
